<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">

      <div class="card shadow-lg border-0 price-card">
        <div class="card-header text-center py-3">
          <h5 class="mb-0 text-uppercase fw-bold tracking-wide">
            <i class="bi bi-receipt me-2"></i>Résumé de commande
          </h5>
        </div>

        <div class="card-body px-4 py-4">

          <!-- Prix unitaire -->
          <div class="d-flex justify-content-between align-items-center py-3 border-bottom">
            <span class="text-muted fs-6">
              <i class="bi bi-tag me-2"></i>Prix unitaire
            </span>
            <span class="fw-semibold fs-5">
              {{ price | number:'1.0-0' }} <small class="text-muted">€</small>
            </span>
          </div>

          <!-- Quantité -->
          <div class="d-flex justify-content-between align-items-center py-3 border-bottom">
            <span class="text-muted fs-6">
              <i class="bi bi-boxes me-2"></i>Quantité
            </span>
            <div class="d-flex align-items-center gap-2">
              <button class="btn btn-qty" (click)="decrement()" [disabled]="quantity() <= 1">
                <i class="bi bi-dash"></i>
              </button>
              <span class="fw-semibold fs-5 quantity-value">{{ quantity() }}</span>
              <button class="btn btn-qty" (click)="increment()">
                <i class="bi bi-plus"></i>
              </button>
            </div>
          </div>

          <!-- Total -->
          <div class="d-flex justify-content-between align-items-center pt-4 pb-2">
            <span class="fw-bold fs-5">
              <i class="bi bi-calculator me-2"></i>Total
            </span>
            <span class="total-amount fw-bold">
              {{ total() | number:'1.0-0' }} <small>€</small>
            </span>
          </div>

        </div>

        <div class="card-footer text-center py-3">
          <small class="text-muted">
            <i class="bi bi-check-circle-fill text-success me-1"></i>
            {{ price | number:'1.0-0' }} € × {{ quantity() }} unités
          </small>
        </div>
      </div>

    </div>
  </div>
</div>
