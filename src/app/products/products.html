<div class="container mt-4">
  <h2 class="mb-3">Products List</h2>

  <ul class="nav nav-pills mb-3">
    <li class="btn p-3 ms-1 btn-outline-info">Selected Products: {{selectedProducts}}</li>
    <li class="btn p-3 ms-1 btn-outline-info">Total: {{total}}</li>
  </ul>
  <table class="table table-striped table-bordered table-hover align-middle">
    <thead class="table-dark">
    <tr>
      <th>#ID</th>
      <th>Name</th>
      <th>Price</th>
      <th>Selected</th>
    </tr>
    </thead>
    <tbody>
      @for (product of products; track product.id) {
        <tr>
          <td>{{ product.id }}</td>
          <td>{{ product.name }}</td>
          <td>{{ product.price | currency:'USD' }}</td>
          @if (product.selected) {
            <td><button (click)="select(product)" class="btn btn-success"><i class="bi bi-check-circle-fill"></i> Is Selected</button></td>
          } @else {
            <td><button (click)="select(product)" class="btn btn-danger"><i class="bi bi-x-circle-fill"></i> Unselected</button></td>
          }
        </tr>
      } @empty {
        <tr>
          <td colspan="4" class="text-center text-muted">No products found</td>
        </tr>
      }
    </tbody>
  </table>
</div>
